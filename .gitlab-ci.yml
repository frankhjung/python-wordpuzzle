---

image: python:3.11-slim

variables:
  UV_CACHE_DIR: "$CI_PROJECT_DIR/.cache/uv"
  PACKAGE_NAME: library

cache:
  paths:
    - .cache/uv
    - .venv/

.setup: &setup
  before_script:
    - apt-get update -y && apt-get install -y curl jq shellcheck
    - curl -LsSf https://astral.sh/uv/install.sh | sh
    - export PATH="$HOME/.local/bin:$PATH"
    - python --version
    - uv --version
    - uv sync
    - uv pip list

build:
  stage: build
  <<: *setup
  script:
    # check formatting
    - uv run ruff format --check
    # check code quality
    - uv run ruff check --output-format gitlab --exit-zero
      --output-file gl-code-quality-report.json
    # unit tests and code coverage
    - uv run pytest --junitxml=public/pytest_report.xml
      --html=public/pytest_report.html --self-contained-html
      --cov-report=xml --cov-report=html:public/coverage
      --cov --cov-fail-under=90
    # sast check for common security issues
    - uv run bandit --verbose --recursive --format json --exit-zero
      --output public/bandit_sast_report.json
      ${PACKAGE_NAME}
      $( [ -r ".bandit.yaml" ] && echo "--configfile .bandit.yaml" )
    # Parse the JSON report and check if there are any high-severity issues
    - HIGH_ISSUE_COUNT=$(jq '[.results[] |
        select(.issue_severity == "HIGH")] |
        length' public/bandit_sast_report.json)
    - |
      if [ "${HIGH_ISSUE_COUNT}" -gt 0 ]; then
        echo "High-severity issues detected: ${HIGH_ISSUE_COUNT}"
        exit 1
      fi
    # generate badges
    - uv run genbadge tests
      --input-file public/pytest_report.xml
      --output-file public/tests.svg
  # regex to get the coverage percentage from pytest (used for badge)
  coverage: /(?i)total.*? (100(?:\.0+)?\%|[1-9]?\d(?:\.\d+)?\%)$/
  artifacts:
    when: always
    paths:
      - public
    reports:
      junit: public/pytest_report.xml
      coverage_report:
        coverage_format: cobertura
        path: coverage.xml
      codequality: gl-code-quality-report.json
      sast: public/bandit_sast_report.json
  rules:
    - if: $CI_COMMIT_TAG
      when: never
    - if: $CI_PIPELINE_SOURCE == "trigger"
      when: never
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH && $CI_OPEN_MERGE_REQUESTS
      when: never
    - if: $CI_COMMIT_BRANCH
